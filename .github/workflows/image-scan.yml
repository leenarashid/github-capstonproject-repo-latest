#Uses trivy Image Scanner for CVEs (Common Vulnerabilities)
name: Image Scan
on:
  workflow_call:


  
jobs:
  image-scanner:
    runs-on: ubuntu-latest
    steps:
     
    
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
           username: ${{ vars.DOCKER_USERNAME }}
           password: ${{ secrets.DOCKER_TOKEN}} 
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ vars.DOCKER_USERNAME }}/github-actions-capstone:latest
          severity: CRITICAL,HIGH
          exit-code: 1
        
# see for the lastest trivy version in Github, trivy actions
